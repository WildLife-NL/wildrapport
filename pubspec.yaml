name: wildrapport
description: "A new Flutter project."
publish_to: 'none'
version: 26.03.17+20260402




environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  wildlifenl_profile_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: main
      path: wildlifenl_profile_components
  wildlifenl_rapporten_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: main
      path: wildlifenl_rapporten_components
  wildlifenl_interaction_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_interaction_components
  wildlifenl_authenticator_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_authenticator_components
  wildlifenl_login_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_login_components
  wildlifenl_map_ui_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: main
      path: wildlifenl_map_ui_components
  wildlifenl_map_logic_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: main
      path: wildlifenl_map_logic_components
  wildlifenl_assets:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: Wildlife-rapport-Components
      path: wildlifenl_assets_components
  auto_size_text: ^3.0.0
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  lottie: ^3.3.1
  provider: ^6.1.4
  shared_preferences: ^2.5.3
  http: ^1.3.0
  permission_handler: ^12.0.1
  geolocator: ^14.0.0
  geocoding: ^2.1.1
  flutter_map: ^6.1.0
  flutter_map_marker_cluster: ^1.3.6
  latlong2: ^0.9.0
  sensors_plus: ^6.1.1
  flutter_svg: ^2.0.7
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  ntp_dart: ^1.2.0
  collection: ^1.17.1
  package_info_plus: ^8.0.3
  flutter_local_notifications: ^17.2.1
  wildlifenl_zone_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: main
      path: wildlifenl_zone_components
  wildlifenl_alarms_components:
    git:
      url: https://github.com/WildLife-NL/wildlifenl-components.git
      ref: main
      path: wildlifenl_alarms_components

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15
  test: ^1.24.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_logo.png"
  web:
    generate: true
    image_path: "assets/app_logo.png"
  windows:
    generate: true
    image_path: "assets/app_logo.png"
  macos:
    generate: true
    image_path: "assets/app_logo.png"

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/app_logo.png
    - assets/LogoWildlifeNL.png
    - assets/loaders/loading_paw.json
    - assets/gifs/login.gif
    - assets/gifs/thankyou.gif
    # Icons + dier-assets zitten in wildlifenl_assets (git)
    - assets/location/location_icon.png
    - assets/animals/
    - assets/sighting.svg
    - assets/damage.svg
    - assets/collision.svg
    - assets/images/
    - assets/images/gewas/
    - assets/images/vee/
    - assets/images/crops.jpg
    - assets/images/livestock.jpg
    - assets/images/property.jpg
    - .env

  fonts:
    - family: Overpass
      fonts:
        - asset: assets/fonts/Overpass-VariableFont_wght.ttf
        - asset: assets/fonts/Overpass-Italic-VariableFont_wght.ttf
          style: italic

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-VariableFont_wdth,wght.ttf
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
          style: italic
